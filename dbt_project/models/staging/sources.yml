version: 2

sources:
  - name: raw_synthea
    description: >
      One-time Synthea CSV export loaded into the MinIO landing zone under
      s3://raw/synthea/. Read via the Trino Hive connector pointing at MinIO.
    schema: synthea
    tables:
      - name: patients
        description: >
          Synthea-generated synthetic patient demographics. One row per patient.
          File: s3://raw/synthea/patients.csv
        columns:
          - name: id
            description: Synthea patient UUID (business key)
          - name: birthdate
            description: Patient birth date (YYYY-MM-DD)
          - name: gender
            description: M or F
          - name: race
          - name: ethnicity
          - name: city
          - name: state
          - name: zip
          - name: bmi
          - name: first
            description: First name
          - name: last
            description: Last name

      - name: conditions
        description: >
          Synthea-generated condition records (SNOMED CT codes). One row per
          condition per patient.  File: s3://raw/synthea/conditions.csv
        columns:
          - name: patient
            description: Patient UUID — foreign key to patients.id
          - name: code
            description: SNOMED CT condition code
          - name: description
            description: Human-readable condition name
          - name: start
            description: Onset date (YYYY-MM-DD)
          - name: stop
            description: Resolved date (nullable, YYYY-MM-DD)

  - name: raw_wearable
    description: >
      Daily wearable simulator output loaded into the MinIO landing zone under
      s3://raw/wearable/YYYY/MM/DD/. Read via the Trino Hive connector.
    schema: wearable
    freshness:
      warn_after:
        count: 26
        period: hour
      error_after:
        count: 50
        period: hour
    loaded_at_field: measured_at
    tables:
      - name: readings
        description: >
          NDJSON file of individual wearable metric readings. One JSON object
          per line. File: s3://raw/wearable/YYYY/MM/DD/readings.json
        columns:
          - name: reading_id
            description: UUID generated by the simulator
          - name: patient_id
            description: Synthea patient UUID
          - name: device_serial
            description: Physical device serial number
          - name: metric_code
            description: "heart_rate, spo2, steps, skin_temperature, blood_glucose, sleep_stage"
          - name: value
            description: Numeric measurement value
          - name: unit
            description: Physical unit string
          - name: quality_flag
            description: "good, noisy, interpolated, missing"
          - name: measured_at
            description: ISO-8601 UTC timestamp of the measurement
          - name: context
            description: JSON object with activity and location_type fields

      - name: alerts
        description: >
          NDJSON file of threshold-breach alerts generated from readings.
          File: s3://raw/wearable/YYYY/MM/DD/alerts.json
        columns:
          - name: alert_id
            description: UUID generated by the alert generator
          - name: patient_id
          - name: device_serial
          - name: alert_type
            description: "threshold_breach, trend_anomaly, missing_data"
          - name: severity
            description: "info, warning, critical"
          - name: metric_code
          - name: threshold_value
          - name: actual_value
          - name: triggered_at
            description: ISO-8601 UTC timestamp of the first breach reading
          - name: reading_id
            description: UUID of the worst reading in the breach window
