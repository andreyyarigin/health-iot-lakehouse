version: 2

models:
  - name: stg_patients
    description: >
      Cleaned and type-cast Synthea patient demographics. One row per patient.
      Source: s3://raw/synthea/patients.csv
    columns:
      - name: patient_id
        description: Synthea patient UUID (business key)
        tests:
          - not_null
          - unique
      - name: birth_date
        description: Patient date of birth
        tests:
          - not_null
      - name: gender
        description: M or F
        tests:
          - not_null
          - accepted_values:
              values: ["M", "F"]
      - name: race
        tests:
          - not_null
      - name: ethnicity
        tests:
          - not_null
      - name: load_datetime
        tests:
          - not_null
      - name: record_source
        tests:
          - not_null

  - name: stg_conditions
    description: >
      Cleaned Synthea condition records with SNOMED codes. One row per patient-condition.
      Source: s3://raw/synthea/conditions.csv
    columns:
      - name: patient_id
        description: Synthea patient UUID — foreign key to stg_patients.patient_id
        tests:
          - not_null
      - name: condition_code
        description: SNOMED CT code
        tests:
          - not_null
      - name: onset_date
        tests:
          - not_null
      - name: load_datetime
        tests:
          - not_null
      - name: record_source
        tests:
          - not_null

  - name: stg_readings
    description: >
      Parsed and cleaned wearable readings. Excludes quality_flag = 'missing'.
      Source: s3://raw/wearable/YYYY/MM/DD/readings.json
    columns:
      - name: reading_id
        description: UUID generated by the simulator
        tests:
          - not_null
          - unique
      - name: patient_id
        tests:
          - not_null
      - name: device_serial
        tests:
          - not_null
      - name: metric_code
        tests:
          - not_null
          - accepted_values:
              values:
                - heart_rate
                - spo2
                - steps
                - skin_temperature
                - blood_glucose
                - sleep_stage
      - name: value
        tests:
          - not_null
      - name: unit
        tests:
          - not_null
      - name: quality_flag
        tests:
          - not_null
          - accepted_values:
              values: ["good", "noisy", "interpolated"]
      - name: measured_at
        tests:
          - not_null
      - name: load_datetime
        tests:
          - not_null
      - name: record_source
        tests:
          - not_null

  - name: stg_alerts
    description: >
      Parsed and cleaned threshold-breach alerts.
      Source: s3://raw/wearable/YYYY/MM/DD/alerts.json
    columns:
      - name: alert_id
        description: UUID generated by the alert generator
        tests:
          - not_null
          - unique
      - name: patient_id
        tests:
          - not_null
      - name: device_serial
        tests:
          - not_null
      - name: alert_type
        tests:
          - not_null
      - name: severity
        tests:
          - not_null
          - accepted_values:
              values: ["info", "warning", "critical"]
      - name: metric_code
        tests:
          - not_null
      - name: triggered_at
        tests:
          - not_null
      - name: reading_id
        tests:
          - not_null
      - name: load_datetime
        tests:
          - not_null
      - name: record_source
        tests:
          - not_null
