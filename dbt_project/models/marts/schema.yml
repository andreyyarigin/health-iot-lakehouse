version: 2

models:
  - name: mart_patient_daily_features
    description: >
      THE ML feature table. One row per patient per day. Contains demographics,
      daily vital statistics, rolling trends, anomaly scores, and the ML target
      label (anomaly_next_24h). Full refresh on every dbt run.
    columns:
      - name: patient_hk
        description: Patient hash key
        tests:
          - not_null
      - name: report_date
        description: The calendar date these features describe
        tests:
          - not_null
      - name: age
        description: Patient age in years as of report_date
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 130
      - name: gender
        tests:
          - not_null
          - accepted_values:
              values: ["M", "F"]
      - name: has_diabetes
        tests:
          - not_null
      - name: has_hypertension
        tests:
          - not_null
      - name: has_cardiac_condition
        tests:
          - not_null
      - name: hr_mean
        description: Daily mean heart rate (bpm)
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 20
              max_value: 300
      - name: spo2_mean
        description: Daily mean SpO2 (%)
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 70
              max_value: 100
      - name: spo2_min
        description: Daily minimum SpO2 (%)
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 70
              max_value: 100
      - name: risk_tier
        tests:
          - not_null
          - accepted_values:
              values: ["low", "moderate", "high", "critical"]
      - name: anomaly_next_24h
        description: >
          ML target label. TRUE if this patient has anomaly_flag=TRUE
          on report_date + 1 day.
        tests:
          - not_null

  - name: mart_anomaly_dashboard
    description: >
      BI dashboard view. One row per patient with current status, latest
      vitals, anomaly trend, and active alert count. Full refresh.
    columns:
      - name: patient_bk
        description: Synthea patient UUID (human-readable identifier)
        tests:
          - not_null
          - unique
      - name: age
        tests:
          - not_null
      - name: risk_tier
        tests:
          - not_null
          - accepted_values:
              values: ["low", "moderate", "high", "critical"]
      - name: anomaly_trend
        tests:
          - not_null
          - accepted_values:
              values: ["improving", "stable", "worsening"]
      - name: active_alerts
        tests:
          - not_null
