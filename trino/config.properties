# ============================================================
# config.properties — Trino node configuration
#
# This is the single-node (coordinator == worker) setup
# appropriate for local development. In production you would
# separate coordinator and worker configs and scale workers
# independently.
#
# Mounted at /etc/trino/config.properties inside the container.
# ============================================================

# ── Node role ─────────────────────────────────────────────────
# Run as both coordinator and worker so a single container is
# sufficient for local development.
coordinator=true
node-scheduler.include-coordinator=true

# ── HTTP server ───────────────────────────────────────────────
http-server.http.port=8080

# ── Cluster memory ────────────────────────────────────────────
# Total query memory budget across the cluster. For a single
# node this caps the maximum memory a single query can use.
query.max-memory=4GB

# Per-node limit referenced in ARCHITECTURE.md §8 performance
# table. Sized for a comfortable 8–16 GB laptop.
query.max-memory-per-node=1GB

# ── Discovery ────────────────────────────────────────────────
# The coordinator advertises itself as the discovery server.
# Workers contact this URI to register.
discovery.uri=http://trino:8080

# ── Spilling ─────────────────────────────────────────────────
# Disable spill-to-disk for local dev (simplifies setup).
spill-enabled=false
