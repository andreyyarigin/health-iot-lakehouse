# ============================================================
# log.properties — Trino logging configuration
#
# Mounted at /etc/trino/log.properties inside the Trino container.
#
# Uses java.util.logging (JUL) level names:
#   FINEST < FINER < FINE < CONFIG < INFO < WARN < SEVERE
#
# The Trino-specific aliases are:
#   DEBUG → FINE, INFO → INFO, WARN → WARN, ERROR → SEVERE
# ============================================================

# ── Root logger ───────────────────────────────────────────────
# INFO is appropriate for local dev — verbose enough to see query
# activity, quiet enough that logs stay readable.
io.trino=INFO

# ── Connector logging ─────────────────────────────────────────
# Silence chatty Iceberg / Hive connector internals at INFO level.
# Set to DEBUG (FINE) when diagnosing connector or S3 issues.
io.trino.plugin.iceberg=INFO
io.trino.plugin.hive=INFO

# ── HTTP client ───────────────────────────────────────────────
# OkHttp logs every request/response at DEBUG; keep it quiet by
# default to avoid flooding logs during dbt runs.
okhttp3=WARN

# ── AWS / S3 client ───────────────────────────────────────────
# The AWS SDK is verbose at INFO; WARN surfaces only real issues.
software.amazon.awssdk=WARN
com.amazonaws=WARN

# ── Discovery / heartbeat ─────────────────────────────────────
# Suppress periodic heartbeat noise from the discovery service.
io.airlift.discovery=WARN

# ── Stats / metrics ───────────────────────────────────────────
io.airlift.stats=WARN
