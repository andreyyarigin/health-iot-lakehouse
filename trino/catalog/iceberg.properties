# ============================================================
# iceberg.properties — Trino Iceberg connector configuration
#
# Mounted at /etc/trino/catalog/iceberg.properties inside the
# Trino container. This makes `iceberg` the catalog name for
# all Trino SQL queries (e.g. SELECT * FROM iceberg.raw_vault…)
# ============================================================

# ── Connector ─────────────────────────────────────────────────
connector.name=iceberg

# ── Catalog: Iceberg REST ─────────────────────────────────────
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg-rest:8181

# ── File format ───────────────────────────────────────────────
# Parquet with ZSTD: best compression ratio for columnar health data.
# See ARCHITECTURE.md §8 for the rationale.
iceberg.file-format=PARQUET
iceberg.compression-codec=ZSTD

# ── Object storage: MinIO (S3-compatible) ─────────────────────
# Path-style access is required for MinIO (virtual-hosted style
# requires proper DNS, which is not available in Docker Compose).
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.aws-access-key=${ENV:MINIO_ACCESS_KEY}
s3.aws-secret-key=${ENV:MINIO_SECRET_KEY}
s3.path-style-access=true
s3.region=us-east-1

# ── Performance ───────────────────────────────────────────────
# Target Parquet file size for writes (128 MB is the recommended
# lower bound for good compression and metadata overhead ratio).
iceberg.target-max-file-size=128MB
